<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="حاسبة النسبة المئوية - احسب النسبة المئوية والخصومات بسرعة." />
  <meta name="theme-color" content="#0a0e27" />
  <title>حاسبة النسبة المئوية - أدواتك اليومية</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://adawatk.pages.dev/percentage.html" />
  <meta property="og:title" content="Percentage Calculator" />
  <meta property="og:description" content="Calculate percentages, discounts, and increases quickly." />
  <meta property="og:site_name" content="adawatk" />
  <meta property="og:locale" content="ar_SA" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Percentage Calculator" />
  <meta name="twitter:description" content="Calculate percentages, discounts, and increases quickly." />
  <!-- Canonical URL -->
  <link rel="canonical" href="https://adawatk.pages.dev/percentage.html" />
  
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Percentage Calculator",
    "description": "Quick percentage calculations",
    "url": "https://adawatk.pages.dev/percentage.html",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "SAR" },
    "inLanguage": "ar"
  }
  </script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8447712286531277"
     crossorigin="anonymous"></script>
</head>
<body>
  <div class="page-wrapper">
    <nav class="navbar">
      <div class="container">
        <a href="index.html" class="nav-brand">
          <div class="nav-logo">أ</div>
          <span class="nav-title">أدواتك اليومية</span>
        </a>
        <ul class="nav-links">
          <li><a href="index.html">الرئيسية</a></li>
          <li><a href="vat.html">الضريبة</a></li>
          <li><a href="hijri.html">التاريخ</a></li>
          <li><a href="loan.html">القرض</a></li>
        </ul>
      </div>
    </nav>
    <section class="tool-page container">
      <div class="tool-header fade-up">
        <div class="tool-icon" style="background:rgba(16,185,129,0.15);color:#10b981;">📊</div>
        <h1>حاسبة النسبة المئوية</h1>
        <p>احسب النسبة المئوية لأي رقم أو قيمة الخصم</p>
      </div>
      <div class="glass-card fade-up">
        <div class="form-grid cols-2">
          <div class="form-group">
            <label for="baseValue">الرقم الأساسي</label>
            <input type="number" id="baseValue" placeholder="مثال: 1500" />
          </div>
          <div class="form-group">
            <label for="percentageValue">النسبة %</label>
            <input type="number" id="percentageValue" placeholder="مثال: 15" step="0.01" />
          </div>
        </div>
        <button class="btn btn-primary" style="background:linear-gradient(135deg,#10b981,#34d399);" onclick="calc()">احسب 📊</button>
      </div>
      <div class="glass-card result-card fade-up">
        <div class="result-area" id="res"><span class="result-label">أدخل الرقم والنسبة</span></div>
      </div>
      <div class="ad-slot fade-up">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-8447712286531277"
           data-ad-slot="auto"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
      <div class="related-tools fade-up">
        <h3>أدوات ذات صلة</h3>
        <div class="related-grid">
          <a href="vat.html" class="related-card"><div class="r-icon" style="background:rgba(16,185,129,0.15);color:#10b981;">🧾</div>حاسبة الضريبة</a>
          <a href="loan.html" class="related-card"><div class="r-icon" style="background:rgba(59,130,246,0.15);color:#3b82f6;">🏦</div>حاسبة القرض</a>
        </div>
      </div>
    </section>
    <footer class="footer container"><p>© 2026 أدواتك اليومية</p></footer>
  </div>
  <script>
    function fmt(n){return new Intl.NumberFormat('ar-SA',{maximumFractionDigits:2}).format(n);}
    function calc(){
      const b=parseFloat(document.getElementById('baseValue').value);
      const p=parseFloat(document.getElementById('percentageValue').value);
      const el=document.getElementById('res');
      if(isNaN(b)||isNaN(p)){el.innerHTML='<span class="result-label">أدخل الرقم والنسبة</span>';return;}
      const v=(b*p)/100;
      el.classList.add('has-result');
      el.innerHTML=`<div><span class="result-label">${p}% من ${fmt(b)}</span><span class="result-value">${fmt(v)}</span><br><span class="result-label">بعد خصم ${p}%</span><span class="result-sub text-green">${fmt(b-v)}</span><br><span class="result-label">بعد زيادة ${p}%</span><span class="result-sub text-orange">${fmt(b+v)}</span></div>`;
    }
  </script>
</body>
</html>
